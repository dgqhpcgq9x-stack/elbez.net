<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex,nofollow" />
  <title>elbez.net</title>

  <style>
    :root {
      --bg: #0b1220;
      --footer-text: #a6b0c3;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--bg);
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
    }

    /* HERO IMAGE ONLY */
    .hero {
      min-height: 100vh;
      background:
        url("assets/hero-journey.png") center / cover no-repeat;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Small footer only */
    footer {
      text-align: center;
      padding: 0.8rem 0 1rem;
      font-size: 0.8rem;
      color: var(--footer-text);
    }

    @media (max-width: 768px) {
      .hero {
        background-position: center top;
      }
    }
  </style>
</head>

<body>

  <main class="hero" aria-label="elbez.net hero image">
    <!-- Intentionally empty:
         All visible content lives inside the image itself -->
  </main>

  <footer>
    © elbez.net · No tracking · No cookies · No analytics
  </footer>

</body>
</html>
