<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex,nofollow" />
  <title>elbez.net</title>

  <style>
    :root {
      /* Light Mode Palette */
      --bg: #f8fafc;
      --surface: #ffffff;
      --text-main: #0f172a;
      --text-muted: #475569;
      --accent: #2563eb;
      --border: #e2e8f0;
      --card-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.10), 0 2px 4px -2px rgb(0 0 0 / 0.10);
      --max-width: 900px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0f172a;
        --surface: #1e293b;
        --text-main: #f1f5f9;
        --text-muted: #94a3b8;
        --accent: #60a5fa;
        --border: #334155;
        --card-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.30);
      }
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: var(--bg);
      color: var(--text-main);
      line-height: 1.6;
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    .container {
      width: 100%;
      max-width: var(--max-width);
      margin: 0 auto;
    }

    header {
      margin-bottom: 2.5rem;
      text-align: center;
    }

    h1 {
      font-size: 2.4rem;
      font-weight: 800;
      letter-spacing: -0.025em;
      color: var(--accent);
      margin-bottom: 0.6rem;
    }

    .intro {
      font-size: 1.15rem;
      color: var(--text-main);
      max-width: 720px;
      margin: 0.75rem auto 0.75rem;
    }

    .privacy-note {
      font-size: 0.88rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-top: 0.25rem;
    }

    /* Focus cards */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 1.2rem;
      margin: 2rem 0 2.2rem;
    }

    .card {
      background-color: var(--surface);
      padding: 1.2rem 1.2rem;
      border-radius: 12px;
      border: 1px solid var(--border);
      box-shadow: var(--card-shadow);
      transition: transform 0.18s ease;
    }

    .card:hover { transform: translateY(-2px); }

    .card h3 {
      font-size: 1.05rem;
      font-weight: 650;
      color: var(--text-main);
      display: flex;
      align-items: center;
    }

    .card h3::before {
      content: "";
      display: inline-block;
      width: 8px;
      height: 8px;
      background-color: var(--accent);
      border-radius: 50%;
      margin-right: 12px;
      flex: 0 0 auto;
    }

    /* Journey section */
    .journey {
      margin: 0 0 2.2rem;
      padding: 1.6rem;
      background-color: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      box-shadow: var(--card-shadow);
      text-align: center;
    }

    .journey h2 {
      font-size: 1.2rem;
      font-weight: 750;
      letter-spacing: -0.01em;
      margin-bottom: 0.4rem;
    }

    .journey .tagline {
      color: var(--text-muted);
      font-size: 0.98rem;
      max-width: 720px;
      margin: 0 auto 1.2rem;
